version: 2

models:
  - name: int_aqi_with_category
    description: AQI readings with composite AQI and category.
    columns:
      - name: reading_hour
        tests:
          - not_null
      - name: composite_aqi
        tests:
          - not_null

  - name: int_aqi_weather_joined
    description: AQI joined with weather by city and hour.
    columns:
      - name: reading_hour
        tests:
          - not_null
      - name: canonical_city
        tests:
          - not_null
