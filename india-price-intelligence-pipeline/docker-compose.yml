version: "3.8"

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.8.0
  env_file:
    - ./.env
  dns:
    - 1.1.1.1
    - 8.8.8.8
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__WEBSERVER__SECRET_KEY: "airflow-local-secret"
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials.json
    _PIP_ADDITIONAL_REQUIREMENTS: "dbt-bigquery==1.7.0 google-cloud-bigquery==3.13.0 requests==2.31.0 beautifulsoup4==4.12.2 pandas==1.5.3 python-dotenv==1.0.0"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./ingestion:/opt/airflow/ingestion
    - ./dbt_project:/opt/airflow/dbt_project
    - ./.env:/opt/airflow/.env
    - ./credentials.json:/opt/airflow/credentials.json:ro
  depends_on:
    - postgres

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username airflow --password airflow --firstname Air --lastname Flow --role Admin --email airflow@example.com"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

volumes:
  postgres-db-volume:
